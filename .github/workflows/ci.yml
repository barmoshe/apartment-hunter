name: CI

# Quality gate: lint + type-check + production build on every push to main and
# every PR targeting main. Deployment (CD) is handled by Vercel's native Git
# integration — pushing to `main` auto-deploys to production, PRs get preview
# URLs — so this workflow intentionally does NOT deploy (avoids double deploys).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# A newer run for the same ref cancels the older one.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, type-check & build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint + jsx-a11y)
        run: npm run lint

      - name: Build (Next.js — runs TypeScript type-check)
        run: npm run build
